<!DOCTYPE html>

  }

    background: #ffffff;
    color: #000000;
    border: 2px solid #000000;
    padding: 10px 18px;
    cursor: pointer;
    font-size: 1em;
  }
  button:hover:not(:disabled) {

    color: #ffffff;
  }

  }
  .center-btn {

  .results {

  }
  .results h2 {

// ---------- State ----------
let quiz = [];
let currentIndex = 0;
let userAnswers = [];

// ---------- Utility ----------
function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuiz() {
  const shuffledQuestions = shuffleArray(questionBank);
  quiz = shuffledQuestions.map(q => {
    return {
      question: q.question,
      options: shuffleArray(q.options),
      correct: q.correct
    };
  });
  userAnswers = new Array(quiz.length).fill(null);
  currentIndex = 0;
}

// ---------- DOM Elements ----------
const quizScreen = document.getElementById('quizScreen');
const resultsScreen = document.getElementById('resultsScreen');
const progressText = document.getElementById('progressText');
const questionText = document.getElementById('questionText');
const optionsList = document.getElementById('optionsList');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const scoreLine = document.getElementById('scoreLine');
const percentLine = document.getElementById('percentLine');
const reviewList = document.getElementById('reviewList');
const restartBtn = document.getElementById('restartBtn');

// ---------- Render ----------
function renderQuestion() {
  const q = quiz[currentIndex];
  progressText.textContent = "Tanong " + (currentIndex + 1) + " sa " + quiz.length;
  questionText.textContent = q.question;
  optionsList.innerHTML = "";

  q.options.forEach(opt => {
    const li = document.createElement('li');
    li.textContent = opt;
    if (userAnswers[currentIndex] === opt) {
      li.classList.add('selected');
    }
    li.addEventListener('click', () => {
      userAnswers[currentIndex] = opt;
      renderQuestion();
    });
    optionsList.appendChild(li);
  });

  prevBtn.disabled = currentIndex === 0;
  nextBtn.textContent = (currentIndex === quiz.length - 1) ? "Tapos na" : "Susunod";
}

function showResults() {
  quizScreen.classList.add('hidden');
  resultsScreen.classList.remove('hidden');

  let correctCount = 0;
  reviewList.innerHTML = "";

  quiz.forEach((q, i) => {
    const userAns = userAnswers[i];
    const isCorrect = userAns === q.correct;
    if (isCorrect) correctCount++;

    const div = document.createElement('div');
    div.className = 'review-item ' + (isCorrect ? 'correct' : 'incorrect');

    const qP = document.createElement('p');
    qP.innerHTML = "<strong>T" + (i + 1) + ":</strong> " + q.question;
    div.appendChild(qP);

    const yourP = document.createElement('p');
    yourP.className = isCorrect ? 'label-correct' : 'label-incorrect';
    yourP.textContent = "Sagot mo: " + (userAns !== null ? userAns : "(walang sagot)");
    div.appendChild(yourP);

    if (!isCorrect) {
      const corrP = document.createElement('p');
      corrP.textContent = "Tamang sagot: " + q.correct;
      div.appendChild(corrP);
    }

    reviewList.appendChild(div);
  });

  const percent = Math.round((correctCount / quiz.length) * 100);
  scoreLine.textContent = "Nakuha mo ang " + correctCount + " sa " + quiz.length + " tanong.";
  percentLine.textContent = "Marka: " + percent + "%";
}

// ---------- Navigation ----------
prevBtn.addEventListener('click', () => {
  if (currentIndex > 0) {
    currentIndex--;
    renderQuestion();
  }
});

nextBtn.addEventListener('click', () => {
  if (currentIndex < quiz.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResults();
  }
});

restartBtn.addEventListener('click', () => {
  resultsScreen.classList.add('hidden');
  quizScreen.classList.remove('hidden');
  buildQuiz();
  renderQuestion();
});

// ---------- Init ----------
buildQuiz();
renderQuestion();
</script>
